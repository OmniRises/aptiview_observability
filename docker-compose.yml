version: "3.9"

services:
  status-ui:
    build:
      context: ./status-ui
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    networks:
      - service_infra_net

  observability:
    build: .
    command: sh -c "mkdir -p /data && touch /data/db.sqlite3 && ln -sf /data/db.sqlite3 /app/db.sqlite3 && python manage.py migrate && gunicorn aptiview_observability.wsgi:application --bind 0.0.0.0:8010 --workers 3 --timeout 60 --access-logfile - --error-logfile -"
    ports:
      - "8010:8010"
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-False}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      SERVICE_BACKEND_ENDPOINT: "${SERVICE_BACKEND_ENDPOINT}"
      SERVICE_INTERVIEW_ENDPOINT: "${SERVICE_INTERVIEW_ENDPOINT:-http://host.docker.internal:3000/healthz}"
      SERVICE_REDIS_ENDPOINT: "${SERVICE_REDIS_ENDPOINT:-redis://service_infra-redis-1:6379}"
      SERVICE_POSTGRES_ENDPOINT: "${SERVICE_POSTGRES_ENDPOINT}"
    volumes:
      - /aptiview/observability_db:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - service_infra_net

  observability-worker:
    build: .
    command: >
      sh -c "
      mkdir -p /data &&
      touch /data/db.sqlite3 &&
      ln -sf /data/db.sqlite3 /app/db.sqlite3 &&
      until python manage.py shell -c 'from django.db import connection; import sys; sys.exit(0 if \"observability_service\" in connection.introspection.table_names() else 1)'; do
        echo 'Waiting for migrations to complete...';
        sleep 2;
      done &&
      python manage.py run_checks
      "
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-False}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      SERVICE_BACKEND_ENDPOINT: "${SERVICE_BACKEND_ENDPOINT}"
      SERVICE_INTERVIEW_ENDPOINT: "${SERVICE_INTERVIEW_ENDPOINT:-http://host.docker.internal:3000/healthz}"
      SERVICE_REDIS_ENDPOINT: "${SERVICE_REDIS_ENDPOINT:-redis://service_infra-redis-1:6379}"
      SERVICE_POSTGRES_ENDPOINT: "${SERVICE_POSTGRES_ENDPOINT}"
    volumes:
      - /aptiview/observability_db:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - service_infra_net

networks:
  service_infra_net:
    external: true
    name: service_infra_default
